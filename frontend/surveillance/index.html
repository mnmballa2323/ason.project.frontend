<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ASON // SURVEILLANCE</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .feed-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 4px;
            background: #000;
        }

        .feed {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 5px;
            color: #00ff00;
            font-family: monospace;
        }

        .rec-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            color: red;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            from {
                top: -10%;
            }

            to {
                top: 110%;
            }
        }
    </style>
</head>

<body>
    <div class="feed-grid">
        <div class="feed">
            <canvas id="cam1"></canvas>
            <div class="overlay">CAM_01 // SERVER_ROOM_ALPHA</div>
            <div class="rec-indicator">REC ●</div>
            <div class="scan-line"></div>
        </div>
        <div class="feed">
            <canvas id="cam2"></canvas>
            <div class="overlay">CAM_02 // ORBITAL_UPLINK</div>
            <div class="rec-indicator">REC ●</div>
            <div class="scan-line" style="animation-delay: 1s;"></div>
        </div>
        <div class="feed">
            <canvas id="cam3"></canvas>
            <div class="overlay">CAM_03 // QUANTUM_CORE</div>
            <div class="rec-indicator">REC ●</div>
            <div class="scan-line" style="animation-delay: 0.5s;"></div>
        </div>
        <div class="feed">
            <canvas id="cam4"></canvas>
            <div class="overlay">CAM_04 // PERIMETER_FENCE</div>
            <div class="rec-indicator">REC ●</div>
            <div class="scan-line" style="animation-delay: 2s;"></div>
        </div>
    </div>

    <script>
        function noise(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            function draw() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;

                const w = canvas.width;
                const h = canvas.height;
                const idata = ctx.createImageData(w, h);
                const buffer32 = new Uint32Array(idata.data.buffer);
                const len = buffer32.length;

                for (let i = 0; i < len; i++) {
                    if (Math.random() < 0.1) {
                        buffer32[i] = 0xff000000; // Static noise
                    } else {
                        // Greenish tint dark
                        buffer32[i] = 0xff001100;
                    }
                }

                ctx.putImageData(idata, 0, 0);

                // Draw some moving shapes to simulate activity
                ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                const x = Math.random() * w;
                const y = Math.random() * h;
                ctx.fillRect(x, y, 50, 50);

                requestAnimationFrame(draw);
            }
            draw();
        }

        noise('cam1');
        noise('cam2');
        noise('cam3');
        noise('cam4');
    </script>
</body>

</html>
