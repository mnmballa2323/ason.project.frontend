<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ASON // AUTHENTICATION</title>
    <style>
        body {
            background: #000;
            color: #00f3ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 2px solid #00f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #ff0000;
            animation: scan 2s infinite alternate;
            box-shadow: 0 0 10px #ff0000;
        }

        .fingerprint {
            font-size: 10rem;
            opacity: 0.5;
        }

        .status {
            margin-top: 2rem;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .details {
            margin-top: 1rem;
            color: #666;
            font-size: 0.8rem;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        .access-granted {
            color: #00ff00;
            border-color: #00ff00;
        }

        .blink {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="scanner-container" id="scanner">
        <div class="scan-line"></div>
        <div class="fingerprint">🖐</div>
    </div>
    <div class="status" id="status">SCANNING BIOMETRICS...</div>
    <div class="details">ID: UNKNOWN // LATENCY: 0.01ms</div>

    <script>
        setTimeout(() => {
            document.getElementById('status').innerText = "CALIBRATING RETINA...";
        }, 2000);
        setTimeout(() => {
            const scanner = document.getElementById('scanner');
            scanner.style.borderColor = '#00ff00';
            scanner.style.boxShadow = '0 0 50px rgba(0, 255, 0, 0.5)';
            document.querySelector('.scan-line').style.background = '#00ff00';
            document.querySelector('.scan-line').style.boxShadow = '0 0 10px #00ff00';
            document.getElementById('status').innerHTML = "<span class='blink'>ACCESS GRANTED</span>";
            document.getElementById('status').style.color = '#00ff00';
            document.querySelector('.details').innerText = "WELCOME, COMMANDER.";
        }, 4000);
    </script>
</body>

</html>
