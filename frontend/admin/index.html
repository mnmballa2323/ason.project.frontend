<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ASON // ADMIN</title>
    <link rel="stylesheet" href="../landing/style.css">
    <style>
        body {
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 80px 1fr;
            height: 100vh;
        }

        .icon-bar {
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1rem;
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            background: #222;
            margin-bottom: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: #666;
            font-size: 1.5rem;
        }

        .icon-btn.active,
        .icon-btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .admin-content {
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #333;
        }

        .module-frame {
            background: #000;
            position: relative;
        }

        .module-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            color: #00ff00;
            font-family: monospace;
            z-index: 10;
            border: 1px solid #00ff00;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        iframe:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="icon-bar">
            <div class="icon-btn active" title="Dashboard">⌘</div>
            <div class="icon-btn" title="Users">👤</div>
            <div class="icon-btn" title="Security">🛡️</div>
            <div class="icon-btn" title="Logs">≣</div>
            <div class="icon-btn" style="margin-top:auto; color:#ff0000;" title="Lockdown">⚠️</div>
        </aside>

        <main class="admin-content">
            <div class="module-frame">
                <div class="module-label">CONSOLE // PANOPTICON</div>
                <iframe src="../console/index.html"></iframe>
            </div>
            <div class="module-frame">
                <div class="module-label">NETWORK // TOPOLOGY</div>
                <iframe src="../network/index.html"></iframe>
            </div>
            <div class="module-frame">
                <div class="module-label">SYSTEM // CORE_HARDWARE</div>
                <iframe src="../system/index.html"></iframe>
            </div>
            <div class="module-frame">
                <div class="module-label">SURVEILLANCE // FEEDS</div>
                <iframe src="../surveillance/index.html"></iframe>
            </div>

            <!-- Healer Overlay (Floating) -->
            <div id="healer-panel"
                style="position: absolute; bottom: 20px; right: 20px; width: 300px; max-height: 200px; background: rgba(0,0,0,0.8); border: 1px solid #00f3ff; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; color: #00f3ff; display: none;">
                <div style="border-bottom: 1px solid #333; margin-bottom: 5px; font-weight: bold;">AUTONOMIC_HEALER //
                    ACTIVE</div>
                <div id="healer-logs"></div>
            </div>
        </main>
    </div>

    <script>
        // Overlay "LIVE" indicators if API is up
        async function checkLive() {
            try {
                // 1. Telemetry
                const res = await fetch('http://localhost:8000/api/admin/telemetry');
                const data = await res.json();

                document.querySelectorAll('.module-label').forEach(el => {
                    if (!el.innerHTML.includes("●")) {
                        el.innerHTML += " <span style='color:#00ff00'>● LIVE</span>";
                    }
                });

                // 2. Healer Logs
                const res2 = await fetch('http://localhost:8000/api/admin/repairs');
                const data2 = await res2.json();

                const healerPanel = document.getElementById('healer-panel');
                const healerLogs = document.getElementById('healer-logs');

                if (data2.logs.length > 0) {
                    healerPanel.style.display = 'block';
                    healerLogs.innerHTML = ""; // Clear old
                    // Show last 3
                    data2.logs.slice(0, 3).forEach(log => {
                        healerLogs.innerHTML += `
                            <div style="margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px;">
                                <span style="color: #666;">[${log.time}]</span> <span style="color: #ff0000;">${log.fault.split(':')[0]}</span><br>
                                <span style="color: #00ff00;">FIX: ${log.action}</span>
                            </div>
                        `;
                    });
                }

            } catch (e) {
                console.log("API Offline");
            }
        }
        setInterval(checkLive, 2000); // Faster polling for healer
    </script>
</body>

</html>
